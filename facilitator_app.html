<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ведущий · Восстановление личности</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap');
:root{
  --bg:#0d0d0d;--s1:#111;--s2:#161616;--s3:#1c1c1c;
  --b1:#222;--b2:#2a2a2a;--b3:#333;
  --gold:#c8a04a;--gold2:#deb96a;--gold3:#f0d090;
  --text:#e0dbd0;--text2:#888070;--text3:#554f45;
  --red:#a03030;--red2:#c04040;
  --green:#2a6040;--green2:#3a8055;
  --yellow:#806020;--yellow2:#a07830;
  --blue:#204060;--blue2:#305878;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
.login-box{width:360px;padding:48px 40px;border:1px solid var(--b2);}
.login-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);margin-bottom:32px;}
.login-title{font-family:'Spectral',serif;font-size:32px;font-weight:300;color:var(--gold);margin-bottom:4px;line-height:1.2;}
.login-sub{font-size:11px;color:var(--text3);margin-bottom:36px;}
.inp{width:100%;background:var(--s2);border:1px solid var(--b2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 14px;outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--gold);}
.btn-login{width:100%;background:var(--gold);color:#0d0d0d;border:none;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:400;letter-spacing:.1em;padding:12px;cursor:pointer;margin-top:16px;transition:background .15s;}
.btn-login:hover{background:var(--gold2);}
.login-err{font-size:11px;color:var(--red2);margin-top:10px;display:none;}

/* SHELL */
#app{display:none;flex:1;overflow:hidden;flex-direction:column;}
.topbar{height:44px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 20px;gap:20px;flex-shrink:0;}
.topbar-logo{font-family:'Spectral',serif;font-size:15px;color:var(--gold);font-weight:300;letter-spacing:.02em;}
.topbar-sep{width:1px;height:20px;background:var(--b2);}
.tab-btn{background:transparent;border:none;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;padding:4px 10px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-btn:hover:not(.active){color:var(--text);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.topbar-user{font-size:11px;color:var(--text3);}
.btn-logout{background:transparent;border:1px solid var(--b2);color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;cursor:pointer;transition:all .15s;}
.btn-logout:hover{border-color:var(--red2);color:var(--red2);}

/* MAIN LAYOUT */
.main-area{flex:1;display:flex;overflow:hidden;}

/* LEFT PANEL */
.left-panel{width:220px;border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;}
.panel-header{padding:12px 16px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--b1);}
.nav-list{flex:1;overflow-y:auto;}
.nav-item{padding:9px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .1s;display:flex;align-items:center;gap:8px;}
.nav-item:hover{background:var(--s2);}
.nav-item.active{border-left-color:var(--gold);background:var(--s2);}
.nav-num{font-size:18px;font-family:'Spectral',serif;color:var(--text3);width:20px;text-align:right;flex-shrink:0;line-height:1;}
.nav-item.active .nav-num{color:var(--gold);}
.nav-info{flex:1;min-width:0;}
.nav-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-phase{font-size:9px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* CONTENT AREA */
.content-area{flex:1;display:flex;overflow:hidden;}
.step-content{flex:1;overflow-y:auto;padding:32px 40px;max-width:820px;}
.step-content::-webkit-scrollbar{width:4px;}
.step-content::-webkit-scrollbar-track{background:transparent;}
.step-content::-webkit-scrollbar-thumb{background:var(--b2);}

/* STEP PAGE */
.step-badge{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.step-title{font-family:'Spectral',serif;font-size:36px;font-weight:300;color:var(--gold);line-height:1.1;margin-bottom:6px;}
.step-theme{font-size:12px;color:var(--text2);margin-bottom:28px;}
.step-deviz{border-left:2px solid var(--gold3);padding:10px 16px;font-family:'Spectral',serif;font-style:italic;font-size:14px;color:var(--text2);margin-bottom:32px;line-height:1.6;}

/* SECTION */
.sec{margin-bottom:28px;}
.sec-title{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);padding-bottom:8px;border-bottom:1px solid var(--b1);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-title-icon{font-size:12px;}

/* PASSPORT TABLE */
.passport-table{width:100%;border-collapse:collapse;}
.passport-table td{padding:8px 12px;border:1px solid var(--b1);font-size:12px;vertical-align:top;line-height:1.6;}
.passport-table td:first-child{color:var(--text2);width:160px;white-space:nowrap;}
.passport-table td:last-child{color:var(--text);}

/* BLOCKS */
.meeting-block{border:1px solid var(--b1);margin-bottom:8px;overflow:hidden;}
.block-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;transition:background .1s;}
.block-head:hover{background:var(--s2);}
.block-head-left{display:flex;align-items:center;gap:10px;}
.block-num{font-size:10px;color:var(--text3);width:24px;}
.block-title{font-size:12px;color:var(--text);}
.block-dur{font-size:10px;color:var(--gold);padding:2px 8px;border:1px solid var(--b2);}
.block-chevron{font-size:10px;color:var(--text3);transition:transform .2s;}
.meeting-block.open .block-chevron{transform:rotate(180deg);}
.block-body{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .25s ease,padding .2s;font-size:12px;color:var(--text2);line-height:1.8;white-space:pre-line;}
.meeting-block.open .block-body{max-height:600px;padding:12px 14px 14px;}

/* MONITOR TABLE */
.monitor-row{display:grid;grid-template-columns:100px 1fr 1fr 1fr;border:1px solid var(--b1);margin-bottom:4px;}
.monitor-cell{padding:8px 12px;font-size:11px;border-right:1px solid var(--b1);line-height:1.5;}
.monitor-cell:last-child{border-right:none;}
.monitor-cell.label{color:var(--text2);font-size:10px;}
.monitor-ok{background:rgba(42,96,64,.15);color:var(--green2);}
.monitor-warn{background:rgba(128,96,32,.15);color:var(--yellow2);}
.monitor-danger{background:rgba(160,48,48,.15);color:var(--red2);}
.monitor-head{background:var(--s2);color:var(--text3);font-size:9px;letter-spacing:.1em;text-transform:uppercase;}

/* PHRASES */
.phrase-item{display:flex;gap:10px;align-items:flex-start;padding:8px 12px;border-left:2px solid var(--b2);margin-bottom:6px;font-size:12px;color:var(--text);line-height:1.6;transition:border-color .15s;}
.phrase-item:hover{border-left-color:var(--gold);}
.phrase-item::before{content:'›';color:var(--gold);font-size:14px;flex-shrink:0;margin-top:1px;}

/* ERRORS */
.error-item{display:flex;gap:10px;align-items:flex-start;padding:8px 12px;border-left:2px solid var(--red);margin-bottom:6px;font-size:12px;color:var(--text2);line-height:1.6;}
.error-item::before{content:'✕';color:var(--red2);font-size:10px;flex-shrink:0;margin-top:3px;}

/* CRITERIA / LIST */
.check-item{display:flex;gap:10px;align-items:flex-start;padding:7px 0;font-size:12px;color:var(--text2);line-height:1.6;border-bottom:1px solid var(--b1);}
.check-item::before{content:'◦';color:var(--gold);flex-shrink:0;margin-top:2px;}

/* HW */
.hw-item{display:flex;gap:10px;align-items:flex-start;padding:8px 12px;border:1px solid var(--b1);margin-bottom:6px;font-size:12px;color:var(--text);line-height:1.6;}
.hw-num{color:var(--gold);font-size:10px;flex-shrink:0;margin-top:2px;width:16px;}

/* DAY TABS */
.day-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.day-tab{padding:6px 14px;border:1px solid var(--b2);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.05em;color:var(--text2);cursor:pointer;transition:all .15s;}
.day-tab:hover{border-color:var(--gold);color:var(--text);}
.day-tab.active{background:rgba(200,160,74,.1);border-color:var(--gold);color:var(--gold);}
.day-tab.meeting{border-color:rgba(200,160,74,.3);}
.day-content{display:none;}
.day-content.active{display:block;}
.day-type-badge{display:inline-block;padding:2px 10px;font-size:9px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;}
.badge-meeting{background:rgba(200,160,74,.1);color:var(--gold);border:1px solid rgba(200,160,74,.3);}
.badge-self{background:rgba(136,128,112,.1);color:var(--text2);border:1px solid var(--b2);}
.badge-individual{background:rgba(42,96,64,.1);color:var(--green2);border:1px solid rgba(42,96,64,.3);}
.day-meeting-title{font-family:'Spectral',serif;font-size:22px;font-weight:300;color:var(--text);margin-bottom:4px;}
.day-time{font-size:10px;color:var(--text3);margin-bottom:6px;}
.day-goal{padding:10px 14px;border-left:2px solid var(--gold);background:rgba(200,160,74,.05);font-size:12px;color:var(--text);line-height:1.7;margin-bottom:20px;}

/* RED FLAGS BOX */
.red-flags-box{background:rgba(160,48,48,.08);border:1px solid rgba(160,48,48,.25);padding:16px 20px;margin-bottom:20px;}
.rf-title{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--red2);margin-bottom:10px;}
.rf-item{font-size:11px;color:var(--text2);padding:4px 0;display:flex;gap:8px;align-items:flex-start;line-height:1.5;}
.rf-item::before{content:'⚠';color:var(--red2);font-size:10px;flex-shrink:0;}

/* ═══════════════════════════════════════
   AI PANEL — плавающая, поверх контента
   ═══════════════════════════════════════ */
#ai-toggle{position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:background .15s;}
#ai-toggle:hover{background:var(--gold2);}
#ai-toggle .ai-badge{position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:var(--green2);border:2px solid var(--bg);}
.ai-panel{position:fixed;bottom:84px;right:24px;width:360px;height:70vh;max-height:600px;border:1px solid var(--b2);display:flex;flex-direction:column;flex-shrink:0;background:#111;z-index:199;box-shadow:0 8px 40px rgba(0,0,0,.7);transition:opacity .2s,transform .2s;}
.ai-panel.hidden{opacity:0;pointer-events:none;transform:translateY(12px);}
.ai-header{padding:12px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ai-dot{width:6px;height:6px;background:var(--green2);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.ai-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.ai-messages::-webkit-scrollbar{width:3px;}
.ai-messages::-webkit-scrollbar-thumb{background:var(--b2);}
.ai-msg{padding:10px 13px;font-size:12px;line-height:1.7;}
.ai-msg.assistant{background:var(--s2);border:1px solid var(--b1);color:var(--text);}
.ai-msg.user{background:rgba(200,160,74,.08);border:1px solid rgba(200,160,74,.2);color:var(--text);align-self:flex-end;max-width:90%;}
.ai-msg.system{background:rgba(42,96,64,.1);border:1px solid rgba(42,96,64,.2);color:var(--text2);font-size:11px;font-style:italic;}
.ai-typing{padding:10px 13px;font-size:11px;color:var(--text3);font-style:italic;}
.ai-input-area{padding:12px 16px;border-top:1px solid var(--b1);flex-shrink:0;}
.ai-context{font-size:9px;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;text-transform:uppercase;}
.ai-quick-btns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.quick-btn{background:transparent;border:1px solid var(--b2);color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 8px;cursor:pointer;transition:all .15s;line-height:1.4;}
.quick-btn:hover{border-color:var(--gold);color:var(--gold);}
.ai-textarea{width:100%;background:var(--s2);border:1px solid var(--b2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 12px;outline:none;resize:none;min-height:60px;max-height:120px;transition:border-color .15s;line-height:1.6;}
.ai-textarea:focus{border-color:var(--gold);}
.ai-send{width:100%;background:transparent;border:1px solid var(--b2);color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;padding:8px;cursor:pointer;margin-top:6px;transition:all .15s;}
.ai-send:hover{border-color:var(--gold);color:var(--gold);}

/* PARTICIPANTS TAB */
.participants-layout{flex:1;display:flex;overflow:hidden;}
.p-list{width:240px;border-right:1px solid var(--b1);overflow-y:auto;flex-shrink:0;}
.p-item{padding:10px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .1s;}
.p-item:hover{background:var(--s2);}
.p-item.active{border-left-color:var(--gold);background:var(--s2);}
.p-name{font-size:12px;color:var(--text);}
.p-step{font-size:10px;color:var(--text3);margin-top:2px;}
.p-flag{display:inline-block;padding:1px 6px;font-size:9px;border:1px solid;margin-top:4px;}
.flag-green{color:var(--green2);border-color:var(--green2);}
.flag-red{color:var(--red2);border-color:var(--red2);}
.p-detail{flex:1;padding:32px 40px;overflow-y:auto;}
.p-detail-name{font-family:'Spectral',serif;font-size:28px;font-weight:300;color:var(--text);margin-bottom:4px;}
.p-detail-login{font-size:11px;color:var(--text3);margin-bottom:24px;}
.step-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-bottom:16px;}
.step-tile{border:1px solid var(--b1);padding:12px;text-align:center;}
.step-tile.current{border-color:var(--gold);background:rgba(200,160,74,.06);}
.step-tile.done{border-color:var(--b2);}
.tile-num{font-family:'Spectral',serif;font-size:24px;color:var(--text3);line-height:1;}
.step-tile.current .tile-num,.step-tile.done .tile-num{color:var(--gold);}
.tile-status{font-size:9px;color:var(--text3);margin-top:3px;}
.btn-unlock{background:var(--gold);color:#0d0d0d;border:none;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;padding:9px 18px;cursor:pointer;margin-top:12px;transition:background .15s;}
.btn-unlock:hover{background:var(--gold2);}
.btn-add-p{width:100%;background:transparent;border:1px dashed var(--b2);color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;padding:10px;cursor:pointer;transition:all .15s;margin-bottom:8px;}
.btn-add-p:hover{border-color:var(--gold);color:var(--gold);}
.flag-card{background:rgba(160,48,48,.06);border:1px solid rgba(160,48,48,.2);padding:12px 14px;margin-bottom:8px;}
.flag-card-title{font-size:10px;color:var(--red2);margin-bottom:4px;letter-spacing:.05em;}
.flag-card-body{font-size:11px;color:var(--text2);line-height:1.6;}
.flag-card-date{font-size:9px;color:var(--text3);margin-top:4px;}
.diary-entry{border:1px solid var(--b1);padding:10px 14px;margin-bottom:6px;}
.diary-date{font-size:9px;color:var(--text3);margin-bottom:4px;}
.diary-text{font-size:11px;color:var(--text2);line-height:1.6;}

/* WHEEL MINI */
.wheel-mini-wrap{display:grid;grid-template-columns:160px 1fr;gap:16px;align-items:start;}

/* SCROLL */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);}

/* EMPTY */
.empty-state{padding:48px;color:var(--text3);font-size:12px;text-align:center;}
</style>
</head>
<body>

<!-- APP -->
<div id="app" style="display:flex;">
  <div class="topbar">
    <div class="topbar-logo">Восстановление личности</div>
    <div class="topbar-sep"></div>
    <button class="tab-btn active" id="tab-program" onclick="switchTab('program')">Программа</button>
    <button class="tab-btn" id="tab-participants" onclick="switchTab('participants')">Участники</button>
    <div class="topbar-right">
      <span class="topbar-user">Ведущий</span>
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <div class="main-area">

    <!-- PROGRAM TAB -->
    <div id="view-program" style="flex:1;display:flex;overflow:hidden;">
      <div class="left-panel">
        <div class="panel-header">Шаги программы</div>
        <div class="nav-list" id="steps-nav"></div>
      </div>
      <div class="content-area">
        <div class="step-content" id="step-content">
          <div class="empty-state">← Выберите шаг</div>
        </div>
      </div>
    </div>

    <!-- PARTICIPANTS TAB -->
    <div id="view-participants" style="display:none;flex:1;overflow:hidden;">
      <div class="participants-layout">
        <div class="p-list" id="p-list">
          <div style="padding:10px 16px;">
            <button class="btn-add-p" onclick="showAddParticipant()">+ Добавить участника</button>
          </div>
          <div id="p-list-inner"></div>
        </div>
        <div class="p-detail" id="p-detail">
          <div class="empty-state">← Выберите участника</div>
        </div>
      </div>
    </div>

  </div>
</div>

<button id="ai-toggle" onclick="toggleAI()" title="AI-ассистент ведущего">🤖<div class="ai-badge"></div></button>

<div class="ai-panel hidden" id="ai-panel">
  <div class="ai-header">
    <div class="ai-dot"></div>
    <div class="ai-label">AI-ассистент ведущего</div>
    <button onclick="toggleAI()" style="margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;">✕</button>
  </div>
  <div class="ai-messages" id="ai-msgs">
    <div class="ai-msg system">Выберите шаг или участника — и задайте любой вопрос по программе.</div>
  </div>
  <div class="ai-input-area">
    <div class="ai-context" id="ai-context">контекст: не выбран</div>
    <div class="ai-quick-btns" id="quick-btns">
      <button class="quick-btn" onclick="quickAsk('Как начать встречу?')">Как начать?</button>
      <button class="quick-btn" onclick="quickAsk('Красные флаги на этом шаге?')">Красные флаги</button>
      <button class="quick-btn" onclick="quickAsk('Фразы против стыда')">Против стыда</button>
      <button class="quick-btn" onclick="quickAsk('Что делать если участник молчит?')">Молчит</button>
    </div>
    <textarea class="ai-textarea" id="ai-input" placeholder="Спроси что угодно по программе или участнику..." onkeydown="aiKey(event)" rows="3"></textarea>
    <button class="ai-send" onclick="sendAI()">Отправить →</button>
  </div>
</div>

 Где тело кричало, а ты сделал вид, что не слышишь?'},{n:'2',t:'Мини-лекция',dur:'15 мин',body:'Если тело истощено, нервная система перегрета — вероятность импульсивного поведения возрастает. Это не «недостаток веры», а реальная уязвимость.'},{n:'3',t:'3 Цар 19:1–8',dur:'15 мин',body:'Восстановление начинается не с подвига, а с питания, воды, отдыха и продолжения пути.'},{n:'4',t:'Карта тела',dur:'20 мин',body:'Где в теле тревога, стыд, пустота, злость, тяга? Что появляется раньше — мысль или телесный сигнал?'},{n:'5',t:'Мой сон и мой хаос',dur:'15 мин',body:'Что происходит после 2–3 плохих ночей? Как меняется тяга, раздражение, способность просить помощи?'},{n:'6',t:'Круг',dur:'10 мин',body:'«Сегодня я заметил...», «Самое неприятное открытие...», «На этой неделе проверю...»'}],homework:['Вести дневник тела 7 дней','Выбрать якорь и применять ежедневно','Соблюдать минимальный ритм']},{id:'m2',label:'Встреча Б',type:'meeting',title:'Якоря, ритм и телесная трезвость',time:'100–110 минут',goal:'Дать рабочие якоря и минимальный ритм.',blocks:[{n:'1',t:'Чек-ин',dur:'10 мин',body:'Что заметил в теле? Что сработало? Где снова пытался быть героем?'},{n:'2',t:'Три якоря',dur:'15 мин',body:'Дыхание 4–7–8: вдох 4 счёта, задержка 7, выдох 8.\nЗаземление 5–4–3–2–1: 5 вижу, 4 слышу, 3 потрогать, 2 запах, 1 вкус.\nДвигательный сброс: пройтись, 10 приседаний, холодная вода.'},{n:'3',t:'Практика якорей',dur:'20 мин',body:'Каждый пробует все три варианта.'},{n:'4',t:'Минимальный ритм',dur:'20 мин',body:'Реальный план: сон, еда, вода, движение, пауза без телефона.\n70% реальности лучше 100% фантазии.'},{n:'5',t:'Телесная молитва',dur:'10 мин',body:'Стопы на полу, спокойное дыхание, короткая фраза присутствия.'}],homework:['Продолжать дневник тела','Применять якорь ежедневно','Жить по минимальному ритму']}]},
{id:3,name:'Надежда и союз помощи',phase:'ШАГ 3 · ФАЗА СТАБИЛИЗАЦИИ',deviz:'Если красиво говоришь о надежде, но никому не звонишь — это литературный кружок',passport:{'Место в программе':'3-й месяц','Главная цель':'Перевести участника от надежды-контракта к надежде-доверию и от изоляции к реальному принятию помощи'},stepGoal:'Участник выходит из изоляции, различает ложную и настоящую надежду, строит реальную карту помощи.',expectedResults:['Объясняет разницу надежды-контракта и надежды-доверия','Имеет реальную карту поддержки с именами','Совершил хотя бы одно действие принятия помощи'],criteria:['Различает надежду-сделку и надежду-доверие','Заполнил карту помощи с реальными людьми','Выполнил хотя бы один пункт контракта принятия помощи'],facilitatorPosition:'Сначала слышать боль, потом вести к шагу. Не уговаривать «просто верить». Принятие помощи — не слабость, а новая форма силы.',redFlags:['«Я сам», «никто не нужен»','Попытка заключить сделку с Богом','Карта поддержки пустая'],facilitatorErrors:['Стыдить за злость на Бога','Подменять живую надежду религиозным внушением','Обещать то чего не можешь гарантировать'],facilitatorPhrases:{support:['«Это больно. И это реальный опыт. Я слышу тебя»','«Принять помощь — не слабость. Это первый акт новой силы»','«Надежда-доверие идёт вперёд, даже когда не может продиктовать Богу сроки»']},monitoring:[{zone:'Надежда',ok:'видит путь, даже если страшно',warn:'сомневается',danger:'всё бессмысленно'},{zone:'Помощь',ok:'просит и принимает',warn:'просит частично',danger:'«я сам»'},{zone:'Действие',ok:'сделал шаг в 48 часов',warn:'откладывает',danger:'саботаж'}],scriptures:['Ин 11:1–44','Мк 9:24','Пс 120'],meetings:[{id:'m1',label:'Встреча А',type:'meeting',title:'История надежды и её предательства',time:'100–110 минут',goal:'Участник видит где его надежда была сломана.',blocks:[{n:'1',t:'Чек-ин',dur:'10 мин',body:'Где на этой неделе снова почувствовал «всё бесполезно»? Где захотел закрыться?'},{n:'2',t:'Ввод в тему',dur:'15 мин',body:'У зависимого человека надежда многократно была предана. Поэтому начинаем с честной истории разрушенной надежды.'},{n:'3',t:'История надежды',dur:'20 мин',body:'3–5 эпизодов когда надеялся и пережил предательство. Что я решил о Боге? о людях? о себе?'},{n:'4',t:'Ложная / настоящая надежда',dur:'20 мин',body:'Контракт: «Если хожу в группу, мне обязаны вернуть семью».\nДоверие: «Я иду путём, даже если не вижу всего результата».'},{n:'5',t:'Разбор Ин 11',dur:'15 мин',body:'Ожидание не совпадает с графиком человека, но помощь не исчезает.'}],homework:['«Лист надежды»: 3 примера когда надежда выжила','Завершить карту союза помощи','Выполнить первый шаг из контракта: звонок или встреча']},{id:'m2',label:'Встреча Б',type:'meeting',title:'Союз помощи и конкретные действия',time:'100–110 минут',goal:'Участник создаёт карту помощи и делает первый реальный шаг.',blocks:[{n:'1',t:'Чек-ин',dur:'10 мин',body:'Что понял о своей старой надежде? Где увидел сделку вместо доверия?'},{n:'2',t:'Три ловушки',dur:'15 мин',body:'Выученная беспомощность — «всё равно ничего не изменится».\nЛожный героизм — «я сам справлюсь».\nМагическое мышление — «если правильно помолиться, Бог обязан помочь».'},{n:'3',t:'Карта реальной поддержки',dur:'20 мин',body:'Кому можно позвонить в кризис? Кому сказать правду? Кто может быть свидетелем? Имена и контакты обязательны.'},{n:'4',t:'Контракт принятия помощи',dur:'20 мин',body:'Кому позвоню в ближайшие 48 часов? Что скажу? О чём попрошу? Как не сорву этот шаг?'}],homework:['Выполнить конкретный шаг из контракта','Завершить карту поддержки']}]},
{id:4,name:'Образ Бога',phase:'ШАГ 4 · ФАЗА ГЛУБИНЫ',deviz:'Шаг не для богословских побед. Задача — помочь участнику увидеть с кем он на самом деле разговаривает когда молится',passport:{'Место в программе':'4-й месяц','Главная цель':'Выявить разрушительный внутренний образ Бога и начать переход к Богу, явленному в Евангелии'},stepGoal:'Выявить разрушительный внутренний образ Бога. Шаг не нужен для споров «кто правильнее верит».',expectedResults:['Конкретно описывает свой внутренний образ Бога','Видит откуда этот образ взялся','Написал письмо Богу которого боится — без цензуры'],criteria:['Называет внутренний образ Бога одним словом или метафорой','Видит источник образа в реальном опыте','Написал письмо Богу которого боится'],facilitatorPosition:'Ведущий не богослов и не судья чужой веры. Он помогает участнику честно посмотреть на то с кем он на самом деле разговаривает когда молится.',redFlags:['Уход в доктринальные формулы избегая личного контакта','Сильная эмоциональная реакция при упражнении «Встреча»'],facilitatorErrors:['Чинить образ Бога лекцией о правильном богословии','Давить правильными стихами','Требовать немедленного «правильного» образа'],facilitatorPhrases:{support:['«Можно знать правильные стихи и жить перед Богом-обвинителем внутри»','«Злость на Бога — это не безверие. Это контакт»','«Если там пусто — это тоже образ. Образ Бога-Отсутствия»']},monitoring:[{zone:'Образ',ok:'называет конкретно',warn:'уходит в доктрину',danger:'полный блок'},{zone:'Источник',ok:'видит реальный опыт',warn:'общие слова',danger:'не связывает с жизнью'}],scriptures:['Лк 15:11–32','Ин 11:35','Рим 8:15','1 Ин 4:18'],meetings:[{id:'m1',label:'Встреча А',type:'meeting',title:'Исследование образа',time:'100–110 минут',goal:'Участник выявляет и описывает свой внутренний образ Бога.',blocks:[{n:'1',t:'Чек-ин',dur:'10 мин',body:'Когда думал о Боге на этой неделе — что первое всплывало: тепло, страх, пустота, суд, равнодушие?'},{n:'2',t:'Ввод',dur:'15 мин',body:'Разница между доктринальным знанием и психологическим образом. Можно знать правильные стихи и жить перед холодным обвинителем внутри.'},{n:'3',t:'Практика «Встреча»',dur:'15 мин',body:'Если бы сейчас встретил Бога, какое у Него было бы лицо? Что Он делает? Если образ не появляется — фиксируется пустота.'},{n:'4',t:'«Нарисуй своего Бога»',dur:'20 мин',body:'Словом, образом или метафорой. Какой Он? На кого похож? Что делает когда ты срываешься?'},{n:'5',t:'Источники образа',dur:'20 мин',body:'Кого из реальных людей напоминает мой образ Бога?'}],homework:['Дневник образа: каждый день записывать один момент когда образ включился','Письмо Богу которого боюсь — без цензуры']},{id:'m2',label:'Встреча Б',type:'meeting',title:'Трансформация образа',time:'100–110 минут',goal:'Участник начинает практику нового образа.',blocks:[{n:'1',t:'Чек-ин',dur:'10 мин',body:'Что заметил за неделю? Когда старый образ включался особенно сильно?'},{n:'2',t:'Сопоставление',dur:'20 мин',body:'Мой внутренний Бог vs Бог который показывает Иисус.\nСудья — и Отец из Лк 15.\nДистант — и Иисус идущий к Лазарю.'},{n:'3',t:'Письмо Богу которого боюсь',dur:'20 мин',body:'Чего боюсь? В чём обвиняю? Где не понимаю? Где злюсь?'},{n:'4',t:'Ответное письмо',dur:'15 мин',body:'Участник пишет от лица евангельского образа Бога. Не богословский трактат — живой ответ.'}],homework:['Каждый день — один честный разговор с Богом как с отцом','Продолжать дневник образа']}]},
{id:5,name:'Инвентаризация',phase:'ШАГ 5 · ФАЗА ГЛУБИНЫ',deviz:'Честная инвентаризация — это не самобичевание и не самооправдание. Это взгляд хирурга перед операцией',passport:{'Место в программе':'5-й месяц','Главная цель':'Увидеть паттерны как систему и отделить честное покаяние от самобичевания'},stepGoal:'Перестать жить в тумане случайностей и увидеть систему: триггер, эмоция, мысль, поведение, последствие.',expectedResults:['Видит паттерн как систему','Знает 5 личных триггеров','Называет настоящую потребность за зависимым поведением'],criteria:['Называет 5 личных триггеров с подробностями','Умеет разбирать эпизод по кругу искренности','Сформулировал формулу паттерна'],facilitatorPosition:'Не следователь и не исповедник. Помочь увидеть систему не разрушая человека. При перегрузе — остановка и заземление.',redFlags:['Тотальное самоуничтожение','Все оправдывает и не берёт ответственности','Паника при работе с конкретными эпизодами'],facilitatorErrors:['Принимать красивые формулировки вместо конкретных фактов','Позволять уходить в самобичевание','Требовать полной инвентаризации за одну встречу'],facilitatorPhrases:{reality:['«Задача не раздавить себя, а увидеть карту»','«Инвентаризация — хирургическая честность»','«Это не казнь и не индульгенция — это опись»']},monitoring:[{zone:'Честность',ok:'называет конкретные факты',warn:'общие слова',danger:'самобичевание или оправдание'},{zone:'Паттерн',ok:'видит систему',warn:'видит отдельные случаи',danger:'«нет паттерна»'},{zone:'Ответственность',ok:'берёт без самоуничтожения',warn:'колеблется',danger:'перекладывает'}],scriptures:['Пс 139:23–24','Пс 51','1 Ин 1:9'],meetings:[{id:'m1',label:'Встреча А',type:'meeting',title:'Карта разрушения и паттерны',time:'100–110 минут',goal:'Участник видит повторяющуюся систему разрушения.',blocks:[{n:'1',t:'Чек-ин',dur:'10 мин',body:'Где на этой неделе снова попал в знакомый сценарий? Что повторилось?'},{n:'2',t:'Ввод',dur:'15 мин',body:'Инвентаризация — хирургическая честность. Нужно // Toggle AI panel
window.toggleAI = () => {
  document.getElementById('ai-panel').classList.toggle('hidden');
};

// Auto init
document.addEventListener("DOMContentLoaded", () => { renderStepsNav(); loadParticipants(); });

// State
let currentStep = null;
let currentMeeting = null;
let aiHistory = [];
let selectedPid = null;
let selectedPName = null;
let selectedPData = null;

// ─── LOGIN ───
window.doLogout = () => { window.location.reload(); };

// ─── TABS ───
window.switchTab = (tab) => {
  document.getElementById('tab-program').classList.toggle('active', tab==='program');
  document.getElementById('tab-participants').classList.toggle('active', tab==='participants');
  document.getElementById('view-program').style.display = tab==='program'?'flex':'none';
  document.getElementById('view-participants').style.display = tab==='participants'?'flex':'none';

  if(tab === 'participants') {
    updateAiContext();
    setQuickBtns([
      'На что обратить внимание?',
      'Что значит этот флаг?',
      'Вопросы для встречи',
      'Признаки самообмана',
    ]);
  } else {
    updateAiContext();
    setQuickBtns([
      'Как начать встречу?',
      'Красные флаги сейчас?',
      'Фразы против стыда',
      'Что делать если молчит?',
    ]);
  }
};

// ─── STEPS NAV ───
function renderStepsNav(){
  const nav = document.getElementById('steps-nav');
  nav.innerHTML = STEPS.map(s => `
    <div class="nav-item" onclick="openStep(${s.id})">
      <div class="nav-num">${s.id}</div>
      <div class="nav-info">
        <div class="nav-name">${s.name}</div>
        <div class="nav-phase">${s.phase}</div>
      </div>
    </div>`).join('');
}

window.openStep = (id) => {
  currentStep = STEPS.find(s=>s.id===id);
  currentMeeting = null;
  document.querySelectorAll('.nav-item').forEach((el,i) => el.classList.toggle('active', STEPS[i]?.id===id));
  renderStepPage();
  updateAiContext();
  setQuickBtns([
    'Как открыть встречу?',
    'Что делать при диссоциации?',
    'Красные флаги сейчас?',
    'Фразы против стыда',
    'Что делать если молчит?',
  ]);
};

function renderStepPage(){
  const s = currentStep;
  if(!s) return;
  const el = document.getElementById('step-content');

  const tabsHtml = s.meetings.map((m,i) => `
    <div class="day-tab ${m.type==='meeting'?'meeting':''} ${i===0?'active':''}" onclick="openMeeting('${m.id}','${s.id}')">${m.label}</div>
  `).join('');

  const meetingsHtml = s.meetings.map((m,i) => renderMeetingHtml(m,i)).join('');

  const monHtml = s.monitoring ? `
    <div class="monitor-row">
      <div class="monitor-cell monitor-head label">Зона</div>
      <div class="monitor-cell monitor-head">🟢 Стабильно</div>
      <div class="monitor-cell monitor-head">🟡 Нестабильно</div>
      <div class="monitor-cell monitor-head">🔴 Высокий риск</div>
    </div>
    ${s.monitoring.map(r=>`
      <div class="monitor-row">
        <div class="monitor-cell label">${r.zone}</div>
        <div class="monitor-cell monitor-ok">${r.ok}</div>
        <div class="monitor-cell monitor-warn">${r.warn}</div>
        <div class="monitor-cell monitor-danger">${r.danger}</div>
      </div>`).join('')}` : '';

  const phrasesHtml = s.facilitatorPhrases ? Object.entries(s.facilitatorPhrases).map(([k,arr])=>`
    <div style="margin-bottom:12px">
      <div style="font-size:9px;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;margin-bottom:6px">${{support:'Поддержка',reality:'Возврат в реальность',shame:'Против стыда',intel:'Против интеллектуализации'}[k]||k}</div>
      ${arr.map(p=>`<div class="phrase-item">${p}</div>`).join('')}
    </div>`).join('') : '';

  el.innerHTML = `
    <div class="step-badge">${s.phase}</div>
    <div class="step-title">${s.name}</div>
    <div class="step-theme">${s.stepGoal||''}</div>
    <div class="step-deviz">${s.deviz}</div>
    <div class="sec">
      <div class="sec-title"><span class="sec-title-icon">📋</span>Паспорт шага</div>
      <table class="passport-table">
        ${Object.entries(s.passport||{}).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
      </table>
    </div>
    ${s.redFlags ? `
    <div class="red-flags-box">
      <div class="rf-title">⚠ Красные флаги — немедленная реакция</div>
      ${s.redFlags.map(f=>`<div class="rf-item">${f}</div>`).join('')}
      ${s.dissociation?`<div style="margin-top:12px;font-size:11px;color:var(--text2);line-height:1.7;border-top:1px solid rgba(160,48,48,.2);padding-top:10px">${s.dissociation}</div>`:''}
    </div>` : ''}
    ${s.facilitatorPosition ? `
    <div class="sec">
      <div class="sec-title"><span class="sec-title-icon">🎯</span>Позиция ведущего</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.8;white-space:pre-line">${s.facilitatorPosition}</div>
    </div>` : ''}
    ${phrasesHtml ? `
    <div class="sec">
      <div class="sec-title"><span class="sec-title-icon">💬</span>Формулировки ведущего</div>
      ${phrasesHtml}
    </div>` : ''}
    ${s.facilitatorErrors ? `
    <div class="sec">
      <div class="sec-title"><span class="sec-title-icon">✕</span>Ошибки ведущего — не делать</div>
      ${s.facilitatorErrors.map(e=>`<div class="error-item">${e}</div>`).join('')}
    </div>` : ''}
    <div class="sec">
      <div class="sec-title"><span class="sec-title-icon">✓</span>Критерии прохождения шага</div>
      ${s.criteria.map(c=>`<div class="check-item">${c}</div>`).join('')}
    </div>
    ${monHtml ? `
    <div class="sec">
      <div class="sec-title"><span class="sec-title-icon">📊</span>Мониторинг изменений</div>
      ${monHtml}
    </div>` : ''}
    <div class="sec">
      <div class="sec-title"><span class="sec-title-icon">📅</span>Сценарии встреч</div>
      <div class="day-tabs">${tabsHtml}</div>
      ${meetingsHtml}
    </div>
  `;
}

function renderMeetingHtml(m, idx){
  const typeBadge = m.type==='meeting'?'badge-meeting':m.type==='individual'?'badge-individual':'badge-self';
  const typeLabel = m.type==='meeting'?'Групповая встреча':m.type==='individual'?'Индивидуальная встреча':'Самостоятельно';
  const blocksHtml = m.blocks.map(b=>`
    <div class="meeting-block" id="blk-${m.id}-${b.n}">
      <div class="block-head" onclick="toggleBlock('blk-${m.id}-${b.n}')">
        <div class="block-head-left">
          <div class="block-num">${b.n}</div>
          <div class="block-title">${b.t}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          ${b.dur?`<div class="block-dur">${b.dur}</div>`:''}
          <div class="block-chevron">▾</div>
        </div>
      </div>
      <div class="block-body">${b.body}</div>
    </div>`).join('');
  const hwHtml = m.homework ? m.homework.map((h,i)=>`
    <div class="hw-item"><div class="hw-num">${i+1}.</div>${h}</div>`).join('') : '';
  return `
    <div class="day-content ${idx===0?'active':''}" id="day-${m.id}">
      <span class="day-type-badge ${typeBadge}">${typeLabel}</span>
      <div class="day-meeting-title">${m.title}</div>
      <div class="day-time">⏱ ${m.time}</div>
      <div class="day-goal">${m.goal}</div>
      ${blocksHtml}
      ${hwHtml ? `
      <div class="sec" style="margin-top:16px">
        <div class="sec-title"><span class="sec-title-icon">📝</span>Домашнее задание</div>
        ${hwHtml}
      </div>` : ''}
    </div>`;
}

window.openMeeting = (mid, sid) => {
  const s = STEPS.find(x=>x.id==sid);
  currentMeeting = s?.meetings.find(m=>m.id===mid);
  document.querySelectorAll('.day-tab').forEach(t => {
    t.classList.toggle('active', t.textContent === (currentMeeting?.label||''));
  });
  document.querySelectorAll('.day-content').forEach(c => c.classList.remove('active'));
  document.getElementById('day-'+mid)?.classList.add('active');
  updateAiContext();
  setQuickBtns([
    'Как начать эту встречу?',
    'Участник уходит в рассуждения',
    'Участник молчит',
    'Участник плачет — что делать?',
    'Как закрыть встречу?',
  ]);
};

window.toggleBlock = (id) => {
  document.getElementById(id)?.classList.toggle('open');
};

// ─── AI ───
function updateAiContext(){
  let ctx = 'не выбран';
  if(selectedPName && document.getElementById('view-participants').style.display !== 'none'){
    ctx = `Участник: ${selectedPName} · Шаг ${selectedPData?.unlockedStep||1}`;
  } else if(currentMeeting){
    ctx = `Шаг ${currentStep?.id} · ${currentMeeting.title}`;
  } else if(currentStep){
    ctx = `Шаг ${currentStep?.id} · ${currentStep?.name}`;
  }
  document.getElementById('ai-context').textContent = 'контекст: ' + ctx;
}

function setQuickBtns(btns){
  document.getElementById('quick-btns').innerHTML = btns.map(b=>
    `<button class="quick-btn" onclick="quickAsk('${b.replace(/'/g,"&#39;")}')">${b}</button>`
  ).join('');
}

window.quickAsk = (txt) => {
  document.getElementById('ai-input').value = txt;
  sendAI();
};

window.aiKey = (e) => {
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendAI(); }
};

window.sendAI = async () => {
  const input = document.getElementById('ai-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  addMsg('user', text);

  // Определяем контекст — программа или участник
  const onParticipantsTab = document.getElementById('view-participants').style.display !== 'none';

  let contextInfo = '';
  if(onParticipantsTab && selectedPData){
    contextInfo = `Ведущий сейчас смотрит на участника: ${selectedPName}.
Текущий шаг участника: ${selectedPData.unlockedStep||1}.
Данные участника: ${JSON.stringify({
  unlockedStep: selectedPData.unlockedStep,
  wheelScores: selectedPData.wheelScores||'не заполнено',
  wheelDone: selectedPData.wheelDone
})}.`;
  } else {
    const stepData = currentStep ? JSON.stringify({
      name: currentStep.name,
      goal: currentStep.stepGoal,
      position: currentStep.facilitatorPosition,
      redFlags: currentStep.redFlags,
      errors: currentStep.facilitatorErrors,
      phrases: currentStep.facilitatorPhrases,
      meeting: currentMeeting ? {title:currentMeeting.title, goal:currentMeeting.goal, blocks:currentMeeting.blocks.map(b=>({title:b.t,body:b.body}))} : null
    }) : '{}';
    contextInfo = `Ведущий смотрит: ${currentStep?.name || 'не выбрано'}.
${currentMeeting ? `Конкретная встреча: ${currentMeeting.title}.` : ''}
Данные из методички: ${stepData}`;
  }

  const system = `Ты — AI-ассистент ведущего программы «Восстановление личности». 9 шагов реабилитации с христианской интеграцией.

${contextInfo}

Твои задачи:
• Отвечать на практические вопросы по программе и сценарию встречи
• Подсказывать конкретные фразы и действия из методички
• Помогать реагировать на поведение участников (молчание, слёзы, агрессия, диссоциация, самообман)
• Предупреждать об ошибках ведущего
• Объяснять логику упражнений простым языком
• Анализировать флаги участников и давать конкретные рекомендации

Позиция ведущего: партнёрство, не прокурор. Стыд не лечит — честность лечит. Конкретика важнее пафоса.
Самообман: оправдания, обобщения, умные слова без действий, перекладывание ответственности.

Стиль ответа: кратко, конкретно, по делу. Максимум 4–5 предложений. Без воды.`;

  const typing = document.createElement('div');
  typing.className = 'ai-typing';
  typing.id = 'ai-typing';
  typing.textContent = '...';
  document.getElementById('ai-msgs').appendChild(typing);
  document.getElementById('ai-msgs').scrollTop = 9999;

  try {
    const msgs = [...aiHistory.slice(-10), {role:'user',content:text}];
    const res = await fetch(PROXY, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-opus-4-5',max_tokens:500,system,messages:msgs})
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Нет ответа';
    document.getElementById('ai-typing')?.remove();
    addMsg('assistant', reply);
    aiHistory.push({role:'user',content:text},{role:'assistant',content:reply});
  } catch(e) {
    document.getElementById('ai-typing')?.remove();
    addMsg('assistant','Ошибка соединения.');
  }
};

function addMsg(role, text){
  const el = document.getElementById('ai-msgs');
  // Убрать welcome если есть
  const sys = el.querySelector('.ai-msg.system');
  if(sys && el.children.length === 1) sys.remove();
  const div = document.createElement('div');
  div.className = `ai-msg ${role}`;
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = 9999;
}

// ─── PARTICIPANTS ───
async function loadParticipants(){
  const snap = await getDocs(collection(db,'participants'));
  const list = document.getElementById('p-list-inner');
  list.innerHTML = '';
  const flagsSnap = await getDocs(collection(db,'flags'));
  const unread = {};
  flagsSnap.forEach(d => {
    const f = d.data();
    if(!f.read) unread[f.participantId] = (unread[f.participantId]||0)+1;
  });
  snap.forEach(d => {
    const data = d.data();
    const item = document.createElement('div');
    item.className = 'p-item';
    item.dataset.uid = d.id;
    const flags = unread[d.id]||0;
    item.innerHTML = `
      <div class="p-name">${data.name}</div>
      <div class="p-step">Шаг ${data.unlockedStep||1}</div>
      ${flags ? `<span class="p-flag flag-red">🚩 ${flags}</span>` : `<span class="p-flag flag-green">активен</span>`}
    `;
    item.onclick = () => selectParticipant(d.id, data);
    list.appendChild(item);
  });
}

window.showAddParticipant = () => {
  document.getElementById('p-detail').innerHTML = `
    <div style="max-width:480px">
      <div style="font-family:'Spectral',serif;font-size:28px;font-weight:300;color:var(--text);margin-bottom:20px">Новый участник</div>
      <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Имя участника (логин для входа)</div>
      <input class="inp" id="new-name" type="text" placeholder="Например: Иван или Иван_К">
      <button class="btn-unlock" style="margin-top:16px" onclick="createParticipant()">Создать участника</button>
      <div style="font-size:11px;color:var(--red2);margin-top:10px;display:none" id="add-err"></div>
    </div>`;
};

window.createParticipant = async () => {
  const name = document.getElementById('new-name').value.trim();
  if(!name) return;
  const key = name.toLowerCase().replace(/\s+/g,'_');
  const existing = await getDoc(doc(db,'participants',key));
  if(existing.exists()){
    document.getElementById('add-err').textContent = 'Участник с таким именем уже есть';
    document.getElementById('add-err').style.display = 'block';
    return;
  }
  await setDoc(doc(db,'participants',key),{
    name, unlockedStep:1, wheelDone:false, createdAt:new Date().toISOString()
  });
  await loadParticipants();
  const snap = await getDoc(doc(db,'participants',key));
  selectParticipant(key, snap.data());
};

async function selectParticipant(uid, data){
  selectedPid = uid;
  selectedPName = data.name;
  selectedPData = data;
  document.querySelectorAll('.p-item').forEach(el => el.classList.toggle('active', el.dataset.uid===uid));
  updateAiContext();

  // Обновить быстрые кнопки с контекстом участника
  setQuickBtns([
    'На что обратить внимание у этого участника?',
    'Что значат его флаги?',
    'Какие вопросы задать на встрече?',
    'Признаки самообмана у него?',
  ]);

  const unlocked = data.unlockedStep||1;

  let flagsHtml = '';
  try {
    const fs = await getDocs(query(collection(db,'flags'),orderBy('createdAt','desc')));
    const pFlags = [];
    fs.forEach(d => { if(d.data().participantId===uid) pFlags.push({id:d.id,...d.data()}); });
    if(pFlags.length){
      flagsHtml = `
        <div style="margin-bottom:24px">
          <div style="font-size:9px;letter-spacing:.15em;color:var(--red2);text-transform:uppercase;margin-bottom:10px">🚩 Сигналы AI (${pFlags.length})</div>
          ${pFlags.slice(0,8).map(f=>`
            <div class="flag-card">
              <div class="flag-card-title">${f.title}</div>
              <div class="flag-card-body">${f.body}</div>
              <div class="flag-card-date">${f.createdAt?new Date(f.createdAt).toLocaleString('ru'):''}</div>
            </div>`).join('')}
        </div>`;
    }
  } catch(e){}

  let diaryHtml = '';
  try {
    const ds = await getDocs(query(collection(db,'participants',uid,'diary'),orderBy('createdAt','desc'),limit(5)));
    if(!ds.empty){
      diaryHtml = `
        <div style="margin-bottom:24px">
          <div style="font-size:9px;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;margin-bottom:10px">Последние записи дневника</div>
          ${[...ds.docs].map(d=>`
            <div class="diary-entry">
              <div class="diary-date">${d.data().createdAt?new Date(d.data().createdAt).toLocaleString('ru'):''}</div>
              <div class="diary-text">${d.data().text||''}</div>
            </div>`).join('')}
        </div>`;
    }
  } catch(e){}

  const stepsHtml = STEPS.map(s => {
    const cls = s.id<unlocked?'done':s.id===unlocked?'current':'';
    const status = s.id<unlocked?'пройден':s.id===unlocked?'текущий':'закрыт';
    return `<div class="step-tile ${cls}"><div class="tile-num">${s.id}</div><div class="tile-status">${status}</div></div>`;
  }).join('');

  document.getElementById('p-detail').innerHTML = `
    <div class="p-detail-name">${data.name}</div>
    <div class="p-detail-login">логин: ${uid}</div>
    ${flagsHtml}
    <div style="margin-bottom:24px">
      <div style="font-size:9px;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;margin-bottom:10px">Шаги программы</div>
      <div class="step-grid">${stepsHtml}</div>
      ${unlocked<STEPS.length ? `<button class="btn-unlock" onclick="unlockNext('${uid}',${unlocked})">Открыть Шаг ${unlocked+1}</button>` : '<div style="color:var(--gold);font-size:11px;margin-top:10px">Программа завершена ✦</div>'}
    </div>
    ${diaryHtml}
  `;
}

window.unlockNext = async (uid, cur) => {
  const next = cur+1;
  await updateDoc(doc(db,'participants',uid),{unlockedStep:next});
  const step = STEPS.find(s=>s.id===next);
  if(step){
    try {
      const pSnap = await getDoc(doc(db,'participants',uid));
      const pData = pSnap.data();
      const scores = pData.wheelScores||{};
      const weak = ['body','mind','relations','work','money','faith'].filter(a=>(scores[a]||5)<=5);
      const res = await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-opus-4-5',max_tokens:250,
          messages:[{role:'user',content:`Участник ${pData.name} переходит на Шаг ${next} «${step.name}». Слабые зоны по колесу: ${weak.join(', ')||'нет'}. Составь 3 конкретных сигнальных вопроса для ведущего — что проверить на этом шаге. Только 3 вопроса, каждый с новой строки.`}]})
      });
      const d = await res.json();
      const q = d.content?.[0]?.text||'';
      await addDoc(collection(db,'flags'),{
        participantId:uid,participantName:pData.name,
        title:`Переход на Шаг ${next} — сигнальные вопросы`,
        body:q,type:'info',createdAt:new Date().toISOString(),read:false
      });
    } catch(e){}
  }
  const snap = await getDoc(doc(db,'participants',uid));
  selectParticipant(uid,snap.data());
  await loadParticipants();
};
</script>
