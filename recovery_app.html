<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Восстановление личности · Д.В.П.</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0d;
  --bg2: #161614;
  --bg3: #1e1e1b;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8e6df;
  --text2: #9e9b92;
  --text3: #6b6860;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --teal: #4a9e8a;
  --teal2: #6bbfab;
  --purple: #7c6fcd;
  --red: #c96b5a;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif; font-size:15px; line-height:1.7; min-height:100vh; }
.app { display:grid; grid-template-columns:280px 1fr; min-height:100vh; }
.sidebar { background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }
.logo { padding:28px 24px 20px; border-bottom:1px solid var(--border); }
.logo-title { font-family:'Playfair Display',serif; font-size:18px; color:var(--gold2); line-height:1.3; }
.logo-sub { font-size:11px; color:var(--text3); letter-spacing:0.08em; text-transform:uppercase; margin-top:4px; }
.steps-nav { padding:16px 12px; flex:1; }
.phase-label { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text3); padding:12px 12px 6px; }
.step-btn { width:100%; background:none; border:none; padding:10px 12px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:10px; transition:background 0.15s; text-align:left; }
.step-btn:hover { background:var(--bg3); }
.step-btn.active { background:rgba(201,168,76,0.12); }
.step-num { width:26px; height:26px; border-radius:50%; background:var(--bg3); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:var(--text2); flex-shrink:0; transition:all 0.15s; }
.step-btn.active .step-num { background:var(--gold); border-color:var(--gold); color:#0f0f0d; }
.step-info { flex:1; min-width:0; }
.step-name { font-size:12.5px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.step-btn.active .step-name { color:var(--gold2); }
.step-theme { font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.main { display:flex; flex-direction:column; min-height:100vh; }
.topbar { padding:20px 40px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--bg); position:sticky; top:0; z-index:10; }
.step-title { font-family:'Playfair Display',serif; font-size:20px; color:var(--text); }
.step-subtitle { font-size:13px; color:var(--text2); margin-top:2px; }
.day-strip { padding:20px 40px; border-bottom:1px solid var(--border); background:var(--bg2); }
.day-strip-label { font-size:11px; color:var(--text3); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:10px; }
.days-row { display:flex; gap:8px; flex-wrap:wrap; }
.day-btn { padding:7px 14px; border-radius:20px; border:1px solid var(--border2); background:none; color:var(--text2); font-family:'Manrope',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all 0.15s; }
.day-btn:hover { border-color:var(--gold); color:var(--gold2); }
.day-btn.active { background:var(--gold); border-color:var(--gold); color:#0f0f0d; font-weight:600; }
.day-btn.meeting { border-color:var(--teal); color:var(--teal2); }
.day-btn.meeting.active { background:var(--teal); border-color:var(--teal); color:#0f0f0d; }
.day-btn.individual { border-color:var(--purple); color:var(--purple); }
.content { flex:1; padding:32px 40px; max-width:860px; }
.day-overview { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:28px; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.card-label { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text3); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.card-label .dot { width:6px; height:6px; border-radius:50%; }
.card-value { font-size:14px; font-weight:500; color:var(--text); line-height:1.5; }
.section { margin-bottom:28px; }
.section-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.section-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.section-title { font-family:'Playfair Display',serif; font-size:17px; color:var(--text); }
.section-body { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px 24px; font-size:14px; color:var(--text2); line-height:1.8; }
.section-body ul { padding-left:18px; }
.section-body li { margin-bottom:6px; }
.section-body strong { color:var(--text); font-weight:600; }
.prayer-block { background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(74,158,138,0.06)); border:1px solid rgba(201,168,76,0.2); border-radius:var(--radius); padding:20px 24px; }
.prayer-title { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
.prayer-direction { display:flex; align-items:flex-start; gap:10px; margin-bottom:10px; font-size:13.5px; color:var(--text2); }
.prayer-direction:last-child { margin-bottom:0; }
.prayer-direction::before { content:"✦"; color:var(--gold); font-size:10px; margin-top:4px; flex-shrink:0; }
.scripture-section { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.scripture-refs { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; flex-wrap:wrap; gap:8px; }
.scripture-ref-btn { padding:6px 14px; border-radius:20px; border:1px solid var(--border2); background:none; color:var(--text2); font-size:12px; cursor:pointer; transition:all 0.15s; font-family:'Manrope',sans-serif; }
.scripture-ref-btn:hover, .scripture-ref-btn.active { background:rgba(201,168,76,0.1); border-color:var(--gold); color:var(--gold2); }
.scripture-analysis { padding:20px 24px; min-height:100px; }
.pulse { width:8px; height:8px; border-radius:50%; background:var(--gold); animation:pulse 1.2s ease-in-out infinite; display:inline-block; }
@keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
.analysis-content h4 { font-family:'Playfair Display',serif; font-size:15px; color:var(--gold2); margin-bottom:8px; margin-top:16px; }
.analysis-content h4:first-child { margin-top:0; }
.analysis-content p { font-size:13.5px; color:var(--text2); line-height:1.8; margin-bottom:8px; }
.apply-block { background:rgba(74,158,138,0.08); border-left:2px solid var(--teal); padding:12px 16px; border-radius:0 8px 8px 0; margin-top:12px; }
.apply-block p { color:var(--text); }
.monitor-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.monitor-zone { border-radius:8px; padding:12px; text-align:center; }
.monitor-zone.green { background:rgba(74,158,138,0.1); border:1px solid rgba(74,158,138,0.2); }
.monitor-zone.yellow { background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.2); }
.monitor-zone.red { background:rgba(201,107,90,0.1); border:1px solid rgba(201,107,90,0.2); }
.zone-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
.monitor-zone.green .zone-label { color:var(--teal2); }
.monitor-zone.yellow .zone-label { color:var(--gold2); }
.monitor-zone.red .zone-label { color:var(--red); }
.zone-text { font-size:11.5px; color:var(--text2); line-height:1.5; }
.facilitator-box { background:rgba(201,107,90,0.06); border:1px solid rgba(201,107,90,0.15); border-radius:var(--radius); padding:16px 20px; }
.fac-label { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--red); margin-bottom:10px; font-weight:600; }
.fac-item { font-size:13px; color:var(--text2); padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.04); display:flex; align-items:flex-start; gap:8px; }
.fac-item:last-child { border-bottom:none; }
.fac-item::before { content:"⚡"; font-size:11px; margin-top:3px; flex-shrink:0; }
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:400px; color:var(--text3); text-align:center; gap:12px; }
.meeting-tag { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; margin-left:10px; }
.tag-group { background:rgba(74,158,138,0.15); color:var(--teal2); border:1px solid rgba(74,158,138,0.25); }
.tag-individual { background:rgba(124,111,205,0.15); color:#a09bdd; border:1px solid rgba(124,111,205,0.25); }
.tag-self { background:rgba(201,168,76,0.1); color:var(--gold); border:1px solid rgba(201,168,76,0.2); }
.weekly-tech { background:rgba(124,111,205,0.06); border:1px solid rgba(124,111,205,0.15); border-radius:var(--radius); padding:20px 24px; }
.wt-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.wt-title { font-family:'Playfair Display',serif; font-size:16px; color:var(--text); }
.wt-badge { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--purple); background:rgba(124,111,205,0.1); padding:3px 10px; border-radius:20px; }
.wt-body { font-size:13.5px; color:var(--text2); line-height:1.8; margin-bottom:12px; }
.wt-steps { padding-left:0; list-style:none; counter-reset:step; }
.wt-steps li { padding:6px 0; border-bottom:1px solid var(--border); display:flex; gap:10px; font-size:13px; color:var(--text2); counter-increment:step; }
.wt-steps li:last-child { border-bottom:none; }
.wt-steps li::before { content:counter(step); width:20px; height:20px; border-radius:50%; background:rgba(124,111,205,0.2); color:var(--purple); font-size:11px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{position:static;height:auto}
  .topbar,.day-strip,.content{padding-left:20px;padding-right:20px}
  .day-overview,.monitor-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo">
    <div class="logo-title">Восстановление личности</div>
    <div class="logo-sub">Путь преодоления · Д.В.П.</div>
  </div>
  <nav class="steps-nav" id="stepsNav"></nav>
</aside>
<main class="main">
  <div class="topbar">
    <div>
      <div class="step-title" id="mainStepTitle">Выбери шаг</div>
      <div class="step-subtitle" id="mainStepSubtitle">← выбери шаг в левом меню</div>
    </div>
  </div>
  <div class="day-strip" id="dayStrip" style="display:none">
    <div class="day-strip-label">Выбери день</div>
    <div class="days-row" id="daysRow"></div>
  </div>
  <div class="content" id="mainContent">
    <div class="empty-state">
      <div style="font-size:48px;opacity:0.1">✦</div>
      <div style="font-size:16px;color:var(--text2)">Выбери шаг и день</div>
      <div style="font-size:13px">чтобы получить полный план встречи</div>
    </div>
  </div>
</main>
</div>

<script>

    prayer_formula:'Господь, я больше не вру о своём состоянии. Помоги выйти из хаоса',

      steps:['Поставить два стула напротив друг друга','Участник говорит зависимости: «Что ты мне давала?»','Пересесть — ответить от имени зависимости','Вернуться — назвать что зависимость взяла взамен','Завершить: «Я вижу тебя. И я выбираю другой путь»'],

          {t:'Чек-ин',dur:'10 мин',body:'Каждый отвечает: 1) С каким состоянием я пришёл? 2) Что мне сейчас труднее всего признать?'},
          {t:'Мини-лекция',dur:'15 мин',body:'Почему зависимость питается ложью. Отрицание, минимизация, рационализация, перенос вины. Фраза ведущего: «Ложь — не потому что ты чудовище. Ложь — потому что зависимость не живёт на свету».'},

          {t:'Писание',dur:'15 мин',body:'Еф 2:10 и Ин 21:15-19. Не приказ стать великим — приглашение к взрослому пути. Восстановленный человек не просто «не погиб» — он учится жить и быть полезным по правде.'},
          {t:'Практика: Карта новой жизни',dur:'25 мин',body:'4 поля: здоровье, дом/стабильность, дело/цель, сообщество. Что уже есть, что провалено, что требует ближайшего внимания.'},
          {t:'Практика: Что делает мою жизнь стоящей',dur:'20 мин',body:'Не абстрактно — конкретно: люди, задачи, вера, работа, творчество, помощь, тело, отдых. То что реально удерживает живым.'},
        ],
        prayers:['За тех кто сегодня начинает строить а не только держаться','За смысл который больше борьбы','Против пустоты трезвости без жизни','За конкретные опоры — людей, дело, ритм'],
        monitor:{green:'Называет реальные опоры — конкретно',yellow:'Говорит общо, смысл пока расплывчатый',red:'Внутри пустота и цинизм'},
        facilitator_watch:['Не продавать красивую мечту — строить реальную жизнь','Смысл должен воплощаться в рутине а не только в словах','Служение без устойчивости — это будущий перегруз'],
        homework:['7 дней дневник смысла: что оживляет, что опустошает','Правило жизни на 90 дней — заполнить','Еф 2:10 — что значит «Его творение»?'],
        show_technique: true,
      },
    ],
  },
];

let currentStep = null;
let currentDay = null;

function renderNav() {
  const nav = document.getElementById('stepsNav');
  nav.innerHTML = '';
  let lastPhase = '';
  PROGRAM.forEach(step => {
    if (step.phase && step.phase !== lastPhase) {
      lastPhase = step.phase;
      const ph = document.createElement('div');
      ph.className = 'phase-label';
      ph.textContent = step.phase;
      nav.appendChild(ph);
    }
    const btn = document.createElement('button');
    btn.className = 'step-btn' + (currentStep && currentStep.id === step.id ? ' active' : '');
    btn.innerHTML = `<div class="step-num">${step.num}</div><div class="step-info"><div class="step-name">${step.name}</div><div class="step-theme">${step.theme}</div></div>`;
    btn.onclick = () => selectStep(step);
    nav.appendChild(btn);
  });
}

function selectStep(step) {
  currentStep = step;
  currentDay = null;
  document.getElementById('mainStepTitle').textContent = `Шаг ${step.num} · ${step.name}`;
  document.getElementById('mainStepSubtitle').textContent = step.theme;
  const strip = document.getElementById('dayStrip');
  strip.style.display = 'block';
  const row = document.getElementById('daysRow');
  row.innerHTML = '';
  step.days.forEach(day => {
    const btn = document.createElement('button');
    let cls = 'day-btn';
    if (day.type === 'meeting') cls += ' meeting';
    else if (day.type === 'individual') cls += ' individual';
    btn.className = cls;
    btn.textContent = day.label;
    btn.onclick = () => { document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); selectDay(day); };
    row.appendChild(btn);
  });
  document.getElementById('mainContent').innerHTML = `<div class="empty-state" style="min-height:300px"><div style="font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);opacity:0.5;font-style:italic">${step.deviz}</div><div style="font-size:13px;color:var(--text3);margin-top:10px">Выбери день выше</div></div>`;
  renderNav();
}

function selectDay(day) {
  currentDay = day;
  const step = currentStep;
  const typeMap = { meeting: ['tag-group','⬤ Групповая встреча'], individual: ['tag-individual','◆ Индивидуальная'], self: ['tag-self','○ Самостоятельно'] };
  const [tagClass, tagLabel] = typeMap[day.type] || ['tag-self', day.type];

  const blocksHTML = day.blocks.map(b => `
    <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-weight:600;font-size:13.5px;color:var(--text)">${b.t}</div>
        <div style="font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:10px">${b.dur}</div>
      </div>
      <div style="font-size:13px;color:var(--text2);line-height:1.75;white-space:pre-line">${b.body}</div>
    </div>`).join('');

  const prayHTML = day.prayers.map(p => `<div class="prayer-direction">${p}</div>`).join('');
  const hwHTML = (day.homework || []).map(h => `<li>${h}</li>`).join('');
  const watchHTML = day.facilitator_watch.map(w => `<div class="fac-item">${w}</div>`).join('');
  const refBtns = step.scriptures.map(ref => `<button class="scripture-ref-btn" onclick="analyzeScripture('${ref}', this)">${ref}</button>`).join('');

  let techHTML = '';
  if (day.show_technique && step.weekly_technique) {
    const wt = step.weekly_technique;
    const stepsLi = wt.steps.map(s => `<li>${s}</li>`).join('');
    techHTML = `<div class="section"><div class="section-header"><div class="section-icon" style="background:rgba(124,111,205,0.15)">🎭</div><div class="section-title">Еженедельная практика пробуждения чувств</div></div><div class="weekly-tech"><div class="wt-header"><div class="wt-title">${wt.name}</div><div class="wt-badge">${wt.type}</div></div><div class="wt-body">${wt.description}</div><ol class="wt-steps">${stepsLi}</ol></div></div>`;
  }

  document.getElementById('mainContent').innerHTML = `
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <h2 style="font-family:'Playfair Display',serif;font-size:22px;color:var(--text)">${day.title}</h2>
        <span class="meeting-tag ${tagClass}">${tagLabel}</span>
      </div>
      <div style="font-size:13px;color:var(--text3)">${day.time}</div>
    </div>
    <div class="day-overview">
      <div class="card"><div class="card-label"><div class="dot" style="background:var(--teal)"></div>Цель встречи</div><div class="card-value">${day.goal}</div></div>
      <div class="card"><div class="card-label"><div class="dot" style="background:var(--gold)"></div>Девиз шага</div><div class="card-value" style="font-style:italic;color:var(--gold2)">${step.deviz}</div></div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-icon" style="background:rgba(201,168,76,0.12)">📋</div><div class="section-title">Сценарий встречи</div></div>
      <div class="section-body">${blocksHTML}</div>
    </div>
    ${techHTML}
    <div class="section">
      <div class="section-header"><div class="section-icon" style="background:rgba(74,158,138,0.1)">📖</div><div class="section-title">Разбор Писания</div></div>
      <div class="scripture-section">
        <div class="scripture-refs">${refBtns}</div>
        <div class="scripture-analysis" id="scriptureAnalysis"><div style="color:var(--text3);font-size:13px">Выбери текст — получишь разбор для группы через AI</div></div>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-icon" style="background:rgba(201,168,76,0.12)">✦</div><div class="section-title">За что молиться сегодня</div></div>
      <div class="prayer-block">
        <div class="prayer-title">✦ НАПРАВЛЕНИЯ МОЛИТВЫ</div>
        ${prayHTML}
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06)">
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em">Молитва шага</div>
          <div style="font-size:13.5px;color:var(--gold2);font-style:italic">«${step.prayer_formula}»</div>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-icon" style="background:rgba(74,158,138,0.1)">📊</div><div class="section-title">Мониторинг участников</div></div>
      <div class="monitor-grid">
        <div class="monitor-zone green"><div class="zone-label">Стабильно</div><div class="zone-text">${day.monitor.green}</div></div>
        <div class="monitor-zone yellow"><div class="zone-label">Нестабильно</div><div class="zone-text">${day.monitor.yellow}</div></div>
        <div class="monitor-zone red"><div class="zone-label">Высокий риск</div><div class="zone-text">${day.monitor.red}</div></div>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-icon" style="background:rgba(201,107,90,0.1)">⚡</div><div class="section-title">На что обратить внимание</div></div>
      <div class="facilitator-box"><div class="fac-label">ВЕДУЩЕМУ</div>${watchHTML}</div>
    </div>
    ${hwHTML ? `<div class="section"><div class="section-header"><div class="section-icon" style="background:rgba(124,111,205,0.1)">📝</div><div class="section-title">Домашнее задание</div></div><div class="section-body"><ul>${hwHTML}</ul></div></div>` : ''}
    <div style="height:40px"></div>
  `;
}

async function analyzeScripture(ref, btn) {
  document.querySelectorAll('.scripture-ref-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const container = document.getElementById('scriptureAnalysis');
  container.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--text3);font-size:13px"><div class="pulse"></div>Анализирую ${ref}...</div>`;
  const step = currentStep;
  const day = currentDay;
  const prompt = `Ты — помощник ведущего реабилитационной группы «Восстановление личности». Сделай разбор текста ${ref} для использования на групповом собрании.

Контекст: Шаг — «${step.name}». Тема встречи — «${day.title}».

Дай разбор в 4 блоках с точными заголовками:

1. КЛЮЧЕВЫЕ СЛОВА — 2-3 важных слова из оригинала (греческий/еврейский) что открывает буквальный смысл.

2. ИСТОРИЧЕСКИЙ КОНТЕКСТ — 2-3 факта которые меняют понимание текста. Коротко и конкретно.

3. ДЛЯ ЧЕЛОВЕКА В ЗАВИСИМОСТИ — что этот текст говорит напрямую человеку который восстанавливается. Без клише. Живым языком.

4. КАК ИСПОЛЬЗОВАТЬ НА ВСТРЕЧЕ — 2-3 конкретных вопроса которые ведущий задаёт группе. И 1 предупреждение: что НЕ делать с этим текстом.

Стиль: честно, без духовного пафоса, конкретно. Умеренная длина.`;
  try {
    const res = await fetch('https://bibleproxy-production.up.railway.app', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1200, messages:[{role:'user',content:prompt}] }),
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    const sections = [
      {key:'КЛЮЧЕВЫЕ СЛОВА', icon:'🔤', color:'var(--gold2)', apply:false},
      {key:'ИСТОРИЧЕСКИЙ КОНТЕКСТ', icon:'🏺', color:'var(--teal2)', apply:false},
      {key:'ДЛЯ ЧЕЛОВЕКА В ЗАВИСИМОСТИ', icon:'🧠', color:'var(--text)', apply:false},
      {key:'КАК ИСПОЛЬЗОВАТЬ НА ВСТРЕЧЕ', icon:'👥', color:'var(--purple)', apply:true},
    ];
    let html = '<div class="analysis-content">';
    sections.forEach((s, i) => {
      const next = sections[i+1];
      let startIdx = text.indexOf(s.key);
      if (startIdx === -1) return;
      startIdx = text.indexOf('\n', startIdx) + 1;
      let endIdx = next ? text.indexOf(next.key) : text.length;
      if (endIdx === -1) endIdx = text.length;
      const content = text.slice(startIdx, endIdx).trim();
      html += `<h4 style="color:${s.color}">${s.icon} ${s.key}</h4>`;
      if (s.apply) {
        html += `<div class="apply-block"><p>${content.replace(/\n/g,'<br>')}</p></div>`;
      } else {
        html += `<p>${content.replace(/\n/g,'<br>')}</p>`;
      }
    });
    html += '</div>';
    container.innerHTML = html || `<p style="color:var(--text2)">${text.replace(/\n/g,'<br>')}</p>`;
  } catch(e) {
    container.innerHTML = `<div style="color:var(--red);font-size:13px">Ошибка: ${e.message}</div>`;
  }
}

renderNav();
</script>
</body>
</html>
